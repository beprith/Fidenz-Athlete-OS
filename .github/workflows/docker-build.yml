# Automated Docker build for the OpenEnv / Space image (catches broken Dockerfile early).
name: Docker build

on:
  push:
    branches: [main, master]
    paths:
      - "athlete_os_env/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "athlete_os_env/**"
      - ".github/workflows/docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./athlete_os_env
          file: ./athlete_os_env/Dockerfile
          push: false
          tags: fidenz-athlete-os:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
